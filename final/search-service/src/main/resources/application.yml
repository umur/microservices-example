server:
  port: 8087
  shutdown: graceful

spring:
  application:
    name: search-service
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/catalog}
    username: ${DB_USER:cinetrack}
    password: ${DB_PASSWORD:cinetrack}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
