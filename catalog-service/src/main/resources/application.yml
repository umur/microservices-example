spring:
  application:
    name: catalog-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWKS_URI:http://localhost:8082/oauth2/jwks}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/catalog_db}
    username: ${DB_USERNAME:catalog}
    password: ${DB_PASSWORD:catalog}
  hikari:
    maximum-pool-size: ${DB_POOL_MAX:10}
    minimum-idle: ${DB_POOL_MIN:5}
    connection-timeout: 3000
    idle-timeout: 600000
    max-lifetime: 1800000
    leak-detection-threshold: 60000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  prometheus:
    metrics:
      export:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.cinetrack: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      tmdb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      tmdb:
        max-attempts: 3
        wait-duration: 500ms

chaos:
  monkey:
    enabled: ${CHAOS_MONKEY_ENABLED:false}
    watcher:
      service: true
      rest-controller: true
    assaults:
      level: 1
      latency-active: false
      exceptions-active: false
